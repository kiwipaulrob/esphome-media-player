substitutions:
  # Native LVGL display rotation in degrees. ESPHome 2026.4 rotates touch input
  # through LVGL too, so no GT911 transform is needed for normal rotation.
  # Default is portrait with the artwork at the top.
  display_rotation: "0"

  # Device profile
  screen_width: "480"
  screen_height: "800"
  artwork_size: "480"
  artwork_display_size: "480"
  clock_cx: "240"
  clock_cy: "400"
  device_slug: "guition-esp32-p4-jc4880p443"
  firmware_manifest_slug: "jc4880p443"
  post_artwork_script: "apply_warm_tones"
  warm_tone_post_script: "warm_tones_done"
  warm_tone_red_boost: "0.11f"
  warm_tone_green_reduce: "0.22f"
  warm_tone_blue_reduce: "0.28f"
  artwork_contrast_boost: "0.04f"
  artwork_saturation_boost: "0.10f"
  artwork_allow_zoom: "false"
  release_artwork_before_download: "true"
  track_info_duration_default: "0"
  pause_lvgl_on_screen_off: "true"
  clock_screensaver_supported: "true"
  idle_action_default: "Clock"
  screen_schedule_internal: "true"
  ha_config_internal: "true"

  # Setup screens
  setup_content_width: "420"
  setup_pad_row: "16"
  setup_instructions_pad_top: "8"
  setup_icon_font: "$icon_font"
  setup_button_width: "180"
  setup_button_height: "44"
  setup_button_radius: "22"
  setup_button_font: "roboto19_font"
  loading_pad_row: "16"
  loading_bar_width: "80"
  loading_bar_height: "4"
  loading_bar_radius: "3"
  loading_bar_pad_top: "24"

  # Main layout
  layout_artwork_x: "0"
  layout_artwork_y: "0"
  layout_artwork_size: "480"
  layout_artwork_error_x: "90"
  layout_artwork_error_y: "225"
  layout_artwork_error_width: "300"
  layout_accent_x: "0"
  layout_accent_y: "480"
  layout_accent_width: "480"
  layout_accent_height: "320"
  layout_track_x: "24"
  layout_track_y: "514"
  layout_track_width: "432"
  layout_track_height: "262"
  layout_title_max_height: "130px"
  layout_progress_width: "480"
  layout_settings_width: "480"
  layout_settings_height: "800"
  layout_clock_width: "480"
  layout_clock_height: "800"

packages:
  # Common
  base: !include ../../common/device/base.yaml
  warm_tones: !include ../../common/addon/warm_tones.yaml
  web_settings: !include ../../common/addon/web_settings.yaml

  # Device-specific
  device: !include device/device.yaml
  lvgl: !include device/lvgl.yaml
  fonts: !include assets/fonts.yaml
  icons: !include assets/icons.yaml
  button: !include theme/button.yaml
