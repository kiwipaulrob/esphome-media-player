# Guition ESP32-P4-JC4880P443 Music Dashboard
substitutions:
  name: "music-dashboard-43inch"
  friendly_name: "Music Dashboard 4.3inch"
  # ha_host: "homeassistant.local"  # Home Assistant hostname or IP (change if HA runs on a different host)
  # ha_port: "8123"  # Home Assistant port (change if HA runs on a non-standard port)
  # Native LVGL display rotation. Use packages-90.yaml for landscape.
  # display_rotation: "180"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# Wifi Setup
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Packages
packages:
  music_dashboard:
    url: https://github.com/jtenniswood/esphome-media-player
    files: [devices/guition-esp32-p4-jc4880p443/packages.yaml]
    ref: main
    refresh: 1s
