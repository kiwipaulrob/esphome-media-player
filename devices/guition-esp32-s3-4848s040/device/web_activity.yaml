# =============================================================================
# S3 WEB SETTINGS ACTIVITY
# =============================================================================
# The S3 can serve the settings UI, but it has much less free memory than the P4.
# These internal buttons are pressed by the browser app while it is open. During
# that activity the normal artwork screen is replaced with a static black screen,
# artwork buffers are released, and LVGL is paused after the overlay is drawn.
# =============================================================================

button:
  - platform: template
    name: "Web Settings Heartbeat"
    id: web_settings_heartbeat_button
    internal: true
    on_press:
      - script.execute: web_settings_heartbeat

  - platform: template
    name: "Web Settings Closed"
    id: web_settings_closed_button
    internal: true
    on_press:
      - script.stop: web_settings_activity_timeout
      - script.execute: exit_web_settings_mode

script:
  - id: web_settings_heartbeat
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(web_settings_active);'
          then:
            - script.execute: enter_web_settings_mode
      - script.execute: web_settings_activity_timeout

  - id: web_settings_activity_timeout
    mode: restart
    then:
      - delay: 25s
      - script.execute: exit_web_settings_mode

  - id: enter_web_settings_mode
    mode: restart
    then:
      - lambda: 'id(web_settings_active) = true;'
      - script.stop: backlight_wake_timeout
      - script.stop: start_hide_track_info_timer
      - script.stop: debounce_artwork_download
      - script.stop: delayed_idle_cleanup
      - script.stop: toggle_ui
      - script.stop: start_speaker_panel_timeout
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lambda: |-
          id(is_screen_dimmed) = false;
          id(is_clock_showing) = false;
          id(is_panel_open) = false;
          lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(settings_panel), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(artwork_error_label), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(album_art_background_widget), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(web_settings_screen), LV_OBJ_FLAG_HIDDEN);
          lv_obj_move_foreground(id(web_settings_screen));
          lv_obj_invalidate(id(web_settings_screen));
      - light.turn_on:
          id: backlight
          brightness: !lambda |-
            bool is_day = id(day_night_sensor_entity).state.empty()
                ? (!id(sun_state_sensor).has_state() || id(sun_state_sensor).state == "above_horizon")
                : id(custom_day_night_is_day);
            float pct = is_day
              ? id(backlight_day_active_brightness).state
              : id(backlight_night_active_brightness).state;
            return pct / 100.0f;
          transition_length: 0s
      - lvgl.widget.redraw:
      - delay: 100ms
      - artwork_image.release: album_art_background
      - artwork_image.release: tv_art_background
      - if:
          condition:
            lambda: 'return ${pause_lvgl_on_screen_off};'
          then:
            - lvgl.pause:

  - id: exit_web_settings_mode
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(web_settings_active);'
          then:
            - if:
                condition: lvgl.is_paused
                then:
                  - lvgl.resume:
                  - lvgl.widget.redraw:
            - lambda: |-
                id(web_settings_active) = false;
                id(is_screen_dimmed) = false;
                lv_obj_add_flag(id(web_settings_screen), LV_OBJ_FLAG_HIDDEN);
            - if:
                condition:
                  lambda: 'return id(is_tv_mode);'
                then:
                  - if:
                      condition:
                        lambda: 'return id(is_tv_idle);'
                      then:
                        - lvgl.widget.hide: album_art_background_widget
                      else:
                        - lvgl.widget.show: album_art_background_widget
                        - lvgl.image.update:
                            id: album_art_background_widget
                            src: tv_art_background
                        - if:
                            condition:
                              lambda: 'return !id(last_tv_artwork_url).empty();'
                            then:
                              - lvgl.widget.update:
                                  id: album_art_background_widget
                                  opa: 50%
                              - artwork_image.set_url:
                                  id: tv_art_background
                                  url: !lambda 'return id(last_tv_artwork_url);'
                            else:
                              - lvgl.image.update:
                                  id: album_art_background_widget
                                  src: album_art_placeholder
                              - lvgl.widget.update:
                                  id: album_art_background_widget
                                  opa: 50%
                else:
                  - lvgl.widget.show: album_art_background_widget
                  - lvgl.image.update:
                      id: album_art_background_widget
                      src: album_art_background
                  - if:
                      condition:
                        lambda: 'return !id(last_artwork_url).empty();'
                      then:
                        - lvgl.widget.update:
                            id: album_art_background_widget
                            opa: 100%
                        - artwork_image.set_url:
                            id: album_art_background
                            url: !lambda 'return id(last_artwork_url);'
                      else:
                        - lvgl.image.update:
                            id: album_art_background_widget
                            src: album_art_placeholder
                        - lvgl.widget.update:
                            id: album_art_background_widget
                            opa: 50%
            - script.execute: show_track_view
            - script.execute: backlight_wake_timeout
