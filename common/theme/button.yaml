substitutions:
  icon_font: icon_font
  text_font: roboto19_font
  button_on_color: "0xFF8C00"
  button_text_color: "0xFFFFFF"
  button_control_color: "0x313131"
  padding: 12px
  radius: 8px
  button_control_radius: 48px
  button_arc_width: "12"
  button_knob_radius: "14"

lvgl:
  style_definitions:
    - id: control_round
      bg_color: $button_control_color
      radius: $button_control_radius

  theme:
    button:
      text_font: $text_font
      scroll_on_focus: false
      radius: $radius
      pad_all: $padding
      shadow_width: 0
      text_color: $button_text_color
      checked:
        bg_color: $button_on_color
        text_color: $button_text_color
    arc:
      arc_color: 0x333333
      arc_width: $button_arc_width
      indicator:
        arc_color: 0x999999
        arc_width: $button_arc_width
      knob:
        bg_color: 0xFFFFFF
        radius: $button_knob_radius
    bar:
      indicator:
        bg_color: 0xFFFFFF
        radius: 0
      main:
        bg_color: 0x000000
        bg_opa: 50%
        radius: 0
