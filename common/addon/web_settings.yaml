# =============================================================================
# WEB SETTINGS UI
# =============================================================================
# Serves the browser-based settings interface. S3 devices pair this with a small
# activity heartbeat package that pauses the normal artwork screen while the
# browser is using the constrained display.
# =============================================================================

json:

text_sensor:
  - platform: template
    name: "Device Profile"
    id: web_device_profile
    lambda: 'return {"${device_slug}"};'
    entity_category: diagnostic
    internal: true
    update_interval: 60s

switch:
  - platform: template
    name: "Developer: Experimental Features"
    id: developer_experimental_features
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:flask-outline"
    entity_category: config
    internal: true

web_server:
  port: 80
  version: 3
  include_internal: true
  log: false
  js_url: "https://jtenniswood.github.io/esphome-media-player/webserver/app.js"
  sorting_groups:
    - id: sg_setup
      name: "Setup"
      sorting_weight: 10
    - id: sg_playback
      name: "Playback"
      sorting_weight: 20
    - id: sg_screen
      name: "Screen"
      sorting_weight: 30
    - id: sg_clock
      name: "Clock"
      sorting_weight: 40
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 50
    - id: sg_device
      name: "Device"
      sorting_weight: 60
